services:
  # Backend — FastAPI on Render Web Service (free tier)
  - type: web
    name: supply-chain-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./supply_chain.db
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://supply-chain-ui.onrender.com,http://localhost:5173
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: db
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  # Frontend — React on Render Static Site (free tier)
  - type: web
    name: supply-chain-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
